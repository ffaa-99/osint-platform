<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSINT Platform — Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0a0a0f;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  /* خلفية animated */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 600px 400px at 20% 50%, rgba(59,130,246,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 400px 300px at 80% 20%, rgba(99,102,241,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .card {
    position: relative;
    background: rgba(15, 15, 25, 0.9);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 48px 44px;
    width: 420px;
    backdrop-filter: blur(20px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 36px;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo-text { color: #fff; font-size: 18px; font-weight: 700; letter-spacing: 2px; }
  .logo-sub  { color: rgba(255,255,255,0.35); font-size: 11px; letter-spacing: 1px; margin-top: 2px; }

  h1 { color: #fff; font-size: 22px; font-weight: 600; margin-bottom: 6px; }
  .subtitle { color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 32px; }

  .field { margin-bottom: 18px; }
  label { display: block; color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 0.5px; margin-bottom: 8px; }

  input[type="text"], input[type="password"] {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 16px;
    color: #fff;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    direction: ltr;
  }

  input:focus {
    border-color: rgba(59,130,246,0.6);
    background: rgba(59,130,246,0.05);
  }

  .btn {
    width: 100%;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.5px;
  }

  .btn:hover  { opacity: 0.9; }
  .btn:active { transform: scale(0.99); }

  .error {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    color: #fca5a5;
    font-size: 13px;
    padding: 10px 14px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .footer {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.2);
    font-size: 11px;
  }

  .dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🔍</div>
    <div>
      <div class="logo-text">OSINT</div>
      <div class="logo-sub">INTELLIGENCE PLATFORM</div>
    </div>
  </div>

  <h1>تسجيل الدخول</h1>
  <p class="subtitle">للمستخدمين المصرح لهم فقط</p>

  {% if error %}
  <div class="error">
    <span>⚠</span>
    <span>{{ error }}</span>
  </div>
  {% endif %}

  <form method="post" action="/login">
    <div class="field">
      <label>اسم المستخدم</label>
      <input type="text" name="username" placeholder="username" autocomplete="username" required>
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn">دخول ←</button>
  </form>

  <div class="footer">
    <div class="dot"></div>
    <span>OSINT Platform — للاستخدام المصرح به فقط</span>
  </div>
</div>
</body>
</html>
